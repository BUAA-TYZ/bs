<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CZML Viewer</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        padding: 10px 12px;
        border-radius: 8px;
        font-family: sans-serif;
        font-size: 13px;
      }
      .toolbar input {
        width: 280px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div><strong>CZML Viewer</strong></div>
      <div>Token: set in source file</div>
      <div>
        CZML:
        <input id="czmlPath" value="./starlink_cluster_24.czml" />
        <button id="reloadBtn">Reload</button>
      </div>
    </div>
    <div id="cesiumContainer"></div>
    <script>
      Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhZGM0YzcyNi1lNzllLTRmMjAtYmRmZS1mMGUyMzFiOWE2OGUiLCJpZCI6NDA2MDI4LCJpYXQiOjE3NzM5MDU2ODB9.k_ePZdtM7iCNI5D68fD4gU9oFm4RXEDnuJlrgDAPOD0";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        timeline: true,
        animation: true,
        shouldAnimate: true,
        terrain: Cesium.Terrain.fromWorldTerrain(),
      });

      let currentDataSource = null;

      async function loadCzml(path) {
        if (currentDataSource) {
          viewer.dataSources.remove(currentDataSource, true);
        }
        currentDataSource = await Cesium.CzmlDataSource.load(path);
        viewer.dataSources.add(currentDataSource);
        viewer.zoomTo(currentDataSource);
      }

      document.getElementById("reloadBtn").addEventListener("click", async () => {
        const path = document.getElementById("czmlPath").value.trim();
        if (path) {
          await loadCzml(path);
        }
      });

      loadCzml("./starlink_cluster_24.czml");
    </script>
  </body>
</html>
